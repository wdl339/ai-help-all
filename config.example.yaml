# ============ ai-help-all 配置文件 ============
# 复制本文件为 config.yaml 后按需修改。

# ---- arxiv 爬取设置 ----
arxiv:
  # 关注的 arxiv 主分类，见 https://arxiv.org/category_taxonomy
  # MLSys / AI Infra 相关分类：
  categories:
    - cs.DC   # 分布式/并行计算（训练、调度、通信）
    - cs.LG   # 机器学习（系统与算法）
    - cs.AR   # 硬件体系结构（GPU/NPU/加速器）
    - cs.PF   # 性能（profiling、benchmark）
    - cs.AI   # 人工智能（算法面）
    - cs.CL   # NLP / 大模型
    - cs.OS   # 操作系统 / 运行时
  # 窗口天数。结合下面的“分界小时”：对参考日期 D，窗口 = [D-days_back 天的分界点, D 的分界点)。
  # 例：D=6/24、分界8点、days_back=1 → 6/23 08:00 ~ 6/24 08:00（本地时间）。运行时也可在网页/命令行临时改。
  days_back: 1
  # “一天”的分界小时（本地时区，0-23）。8 表示一天从早上 8 点算到次日 8 点。
  day_boundary_hour: 8
  # 本地时区相对 UTC 的偏移小时（北京=8）。用于把“分界小时”对齐到 UTC（arxiv 时间是 UTC）。
  tz_offset_hours: 8
  # 每天最多从 arxiv 拉取多少篇候选（每天上限；多天时实际上限 = 本值 × 天数）。
  # 一天 7 个分类约 300-400 篇，设大些以免漏。
  max_results: 500
  # arxiv 抓取调优（一般不用改）：每页条数 / 请求间隔(秒,礼貌延迟) / 失败重试次数
  page_size: 100
  request_delay_seconds: 3.0
  fetch_retries: 3

# ---- 你的研究兴趣（用自然语言描述，越具体筛得越准）----
interests: |
  我的主要研究方向是 MLSys / AI Infra（机器学习系统与基础设施）。

  ## 关注方向（命中其核心贡献才算相关）
  - 大模型训练系统：覆盖预训练与后训练(SFT、RL、OPD 等)；分布式训练、并行策略(数据/张量/流水/专家并行)、通信优化、显存优化、训练框架；
  - 推理与部署：高效推理引擎、KV cache、量化/稀疏/蒸馏、投机解码、serving 与批处理、LLM 推理加速；
  - Agent 系统：仅当核心贡献是 Agent 的运行时/系统支撑（编排、调度、长上下文记忆/状态管理、沙箱、部署、可观测、多智能体）时才算相关，而非 Agent 行为/提示词策略/任务效果本身；
  - 端侧 / on-device / resource-constrained AI：边缘推理、移动端部署、低资源优化；
  - 调度与运行时：GPU/集群调度、资源管理、弹性训练、运行时系统；
  - 编译与算子：编译器、kernel/算子优化、图优化、IR/codegen（以执行效率/系统实现为核心，而非纯数学方法）；
  - 硬件利用：GPU/NPU 利用率、通信库、互联(NVLink/RDMA)、混合精度（以系统软件为中心，而非芯片/电路设计）；
  - 多模态：多模态大模型(VLM/视频/语音/生成)的训练与推理系统及相关算法。
  - 大模型/基础模型技术报告：大厂或头部团队发布的 LLM/VLM/多模态基座模型技术报告（含训练数据、训练/推理系统与工程细节、scaling 等），即使偏模型本身也在推荐范围内。
  AI 算法类工作(新模型结构、训练方法、RL 等)也读一些，但优先级低于系统/基础设施类。

  ## 排除 / 不感兴趣（命中则压到低分或边界，除非另有可迁移、可复用的系统/方法贡献）
  - 纯应用/垂直场景落地（自动驾驶、医疗诊断、推荐、金融、安防、机器人、领域助手/工作流等），系统要素只服务于单一场景；
  - 以芯片/电路/RTL/datapath/存算单元/软硬件 co-design 为核心、系统软件为辅的硬件优先论文；
  - 纯 CNN/GNN/RNN、推荐、视觉骨干、语音等非 LLM 深度学习系统，除非能明确迁移到 LLM/基础模型基础设施；
  - 仅做容器/K8s/编排/虚拟化的 benchmark、可行性或测量研究，且未提出实质系统机制；
  - 与 ML/AI 无关的纯系统、纯理论证明、与系统无关的纯 CV 检测分割。
  注意：不要仅因论文用到 summarization/compression/memory/context 管理就判为纯应用——若其核心创新是"跨多次调用、可复用的长上下文/记忆管理机制"，应视为基础设施。

# 相关性打分阈值（1-10），>= 该分数的论文才会被总结并推送
relevance_threshold: 6
# 每份日报最多自动 AI 总结多少篇。多天 = 逐天各出一份独立日报，每份取当天相关性最高的前 N 篇。
# 例：days_back=2 → 生成两份日报（前天/昨天各一份），每份各 N 篇，而不是 2 天合计 N 篇。
# 其余达到阈值的论文仍会保留，只是不自动总结，可在网页上按需单独「生成总结」。
max_summarize: 15
# 给入选论文自动打的标签（由你定义）。LLM 会为每篇从下面列表里选一个最贴切的；
# 网页上可按 tag 分组查看。"其他" 会自动确保存在（作为兜底分类）。
tags:
  - 训练
  - 推理
  - Agent
  - 端侧
  - 调度
  - 编译
  - 硬件
  - 其他

# 是否下载 PDF 首页提取作者单位/发表机构（arxiv API 不提供机构信息；关掉可省下载时间）
fetch_affiliations: true
# 提取作者单位时，PDF 首页文本截断到多少字符（首页含作者/单位即可）
affiliation_pdf_chars: 1800
# 展示作者时最多列几位（markdown/邮件）
max_authors_shown: 6

# 总结是否基于论文全文：先下 PDF 抽文本，失败抓 arXiv HTML 版，最后回退摘要。
# 关掉则只用摘要总结（更快、更省 token）。注意：相关性「打分」始终只用摘要，全文仅用于总结。
summarize_fulltext: true
# 全文喂给 LLM 前截断到多少字符（越大越完整但越耗 token；一篇论文正文常 4-6 万字符）
fulltext_max_chars: 100000

# 是否在每份日报顶部生成「今日趋势综述」：综观当天入选论文，给出整体趋势 + 编辑精选 3-5 篇。
# 用「总结模型」生成，每天仅额外 1 次 LLM 调用；展示在 仪表盘 / 邮件 / markdown 顶部。
trend_summary: true

# ---- LLM 设置 ----
# 可用模型(SJTU 交我算 API)调用名 / 上下文长度：
#   minimax-m2.7       MiniMax-M2.7            192k  (强；思考模型，质量高=默认筛选/总结模型，需较大 max_tokens)
#   deepseek-chat      DeepSeek V3.2 常规模式   32k
#   deepseek-reasoner  DeepSeek V3.2 思考模式   32k  (不接受 temperature)
#   qwen3.5-27b        Qwen3.5-27B            256k  (最快，备选筛选模型)
# 可用 `python main.py --list-models` 校验密钥并查看实际可用模型。
llm:
  base_url: https://models.sjtu.edu.cn/api/v1
  # 推荐用环境变量 AI_HELP_ALL_API_KEY，留空则读环境变量（不要把真实 key 写进会上传 git 的文件！）
  api_key: ""
  # 筛选用模型（批量结构化打分，返回 JSON 数组；minimax 为思考模型，filter_max_tokens 需留足）
  filter_model: minimax-m2.7
  # 总结用模型（minimax 总结质量高；它是思考模型，下面 summarize_max_tokens 需留足）
  summarize_model: minimax-m2.7
  # 请求数限速（申请额度：每分钟 10 次，留 1 余量）
  requests_per_minute: 9
  # token 限速（申请额度：每分钟 100000，默认留约 10% 余量）
  tokens_per_minute: 90000
  # 并发线程数（同时在途请求数，受限速器约束；调大可隐藏网络延迟、加速）
  max_concurrency: 8
  # 单次请求超时(秒)，超时即重试
  request_timeout: 180
  # 超时/失败的最大尝试次数，用尽仍失败则该篇标记失败（可在网页上单独「重新总结」）
  max_retries: 2
  # 一次筛选 prompt 里塞多少篇论文（控制单请求 token）
  filter_batch_size: 20
  # 筛选时每篇摘要截断到多少字符（够覆盖绝大多数摘要；调大更全但更耗 token）
  filter_abstract_chars: 1200
  # 单次请求最大输出 token（思考模型如 minimax 会先用 token 推理，需留足余量）
  filter_max_tokens: 8192
  # 总结要产出 多段深度解读 + 摘要翻译 + 作者单位（思考模型还会先消耗 token 推理），故留足余量
  summarize_max_tokens: 8192
  # 趋势综述（每天 1 次）的最大输出 token（思考模型需留足推理余量）
  trend_max_tokens: 6144
  # 总结输出语言
  language: 中文

# ---- 推送设置 ----
push:
  # 始终会在 ./digests/ 下生成 markdown 日报
  markdown: true
  # 邮件推送（可选）。这里只填 SMTP 连接参数；“是否发邮件”改由运行时控制：
  #   CLI：python main.py --email      网页：顶部工具栏勾选「发送邮件」（默认都不发）
  # 常见 SMTP：QQ=smtp.qq.com / 163=smtp.163.com / Gmail=smtp.gmail.com
  # 端口与加密配套：SSL 用 465 且 use_ssl: true；STARTTLS 用 587 且 use_ssl: false
  email:
    smtp_host: smtp.example.com   # 邮箱服务商的 SMTP 服务器
    smtp_port: 465                # SSL=465 / STARTTLS=587
    use_ssl: true                 # 465→true；587→false
    username: you@example.com     # SMTP 登录账号（通常是完整邮箱）
    # 这里填“授权码/应用专用密码”（不是邮箱登录密码！）；推荐留空，改用环境变量 AI_HELP_ALL_SMTP_PASSWORD
    password: ""
    from_addr: you@example.com    # 发件人；留空则自动用 username
    to_addrs:                     # 收件人，可填多个
      - you@example.com
