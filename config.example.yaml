# ============ ai-help-all 配置文件 ============
# 复制本文件为 config.yaml 后按需修改。

# ---- arxiv 爬取设置 ----
arxiv:
  # 关注的 arxiv 主分类，见 https://arxiv.org/category_taxonomy
  categories:
    - cs.DC   # 分布式/并行计算
    - cs.LG   # 机器学习
    - cs.AR   # 硬件体系结构
    - cs.PF   # 性能
    - cs.AI   # 人工智能
    - cs.CL   # NLP / 大模型
  # 只抓取最近 N 天提交/更新的论文（一般设 1 表示“今天”，周一可设 3 把周末补上）
  days_back: 1
  # 每次最多从 arxiv 拉取多少篇候选（拉取上限，越大越全但越慢）
  max_results: 300

# ---- 你的研究兴趣（用自然语言描述，越具体筛得越准）----
interests: |
  我的主要研究方向是 MLSys / AI Infra（机器学习系统与基础设施），关注训练、推理、
  部署、调度、运行时、编译、GPU/NPU 利用、Agent 系统、端侧/on-device/资源受限 AI 等。
  AI 算法类工作（新模型、训练方法、多模态等）也读一些，但优先级低于系统/基础设施类。
  不太关心纯理论证明、与系统无关的纯 CV 检测分割类工作。

# 相关性打分阈值（1-10），>= 该分数的论文才会被总结并推送
relevance_threshold: 6
# 最多总结/推送多少篇（按相关性从高到低）
max_summarize: 15

# ---- LLM 设置 ----
# 可用模型(SJTU 交我算 API)调用名 / 上下文 / 说明：
#   glm-5.1            GLM-5.1        128k  强；直接返回内容，适合批量打分（默认筛选模型）
#   minimax-m2.7       MiniMax-M2.7   192k  强；思考模型，总结质量高（默认总结模型，需较大 max_tokens）
#   deepseek-chat      DeepSeek V3.2  32k   通用文本
#   deepseek-reasoner  DeepSeek V3.2  32k   复杂推理(不接受 temperature)
#   qwen3.5-27b        Qwen3.5-27B    256k  最快，备选筛选模型
# 用 `python main.py --list-models` 可校验密钥并查看实际可用模型 id。
llm:
  base_url: https://models.sjtu.edu.cn/api/v1
  # 推荐用环境变量 AI_HELP_ALL_API_KEY，留空则读环境变量（不要把真实 key 写进会上传 git 的文件！）
  api_key: ""
  # 筛选用模型（批量结构化打分，glm 直接返回 JSON、稳定）
  filter_model: glm-5.1
  # 总结用模型（minimax 总结质量高；它是思考模型，summarize_max_tokens 要留足）
  summarize_model: minimax-m2.7
  # 请求数限速（申请额度：每分钟 10 次，留 1 余量）
  requests_per_minute: 9
  # token 限速（申请额度：每分钟 100000，默认留约 10% 余量）
  tokens_per_minute: 90000
  # 并发线程数（同时在途请求数，受限速器约束；调大可隐藏网络延迟、加速）
  max_concurrency: 8
  # 一次筛选 prompt 里塞多少篇论文（控制单请求 token；用大上下文模型可调大）
  filter_batch_size: 20
  # 单次请求最大输出 token（思考模型如 minimax 会先用 token 推理，需留足余量）
  filter_max_tokens: 2048
  summarize_max_tokens: 2048
  # 总结输出语言
  language: 中文

# ---- 推送设置 ----
push:
  # 始终会在 ./digests/ 下生成 markdown 日报
  markdown: true
  # 邮件推送（可选）。不需要就保持 enabled: false
  email:
    enabled: false
    smtp_host: smtp.example.com
    smtp_port: 465
    use_ssl: true
    username: you@example.com
    # 推荐用环境变量 AI_HELP_ALL_SMTP_PASSWORD
    password: ""
    from_addr: you@example.com
    to_addrs:
      - you@example.com
