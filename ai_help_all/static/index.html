<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aha · 论文日报</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%235b9dff'/%3E%3Cstop offset='1' stop-color='%237c5cff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='24' fill='url(%23g)'/%3E%3Ctext x='50' y='62' font-size='44' font-family='Arial,sans-serif' font-weight='bold' fill='white' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E" />
<style>
  :root {
    --bg: #f6f7f9; --panel: #ffffff; --panel2: #eef1f5; --border: #e2e6ec;
    --fg: #1c2128; --muted: #667085; --accent: #2f6feb; --accent2: #7c5cff;
    --green: #1a7f37; --yellow: #b8860b; --red: #d1242f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  header {
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    position: sticky; top: 0; background: rgba(255,255,255,0.85); backdrop-filter: blur(8px); z-index: 10;
  }
  .brand { display: flex; align-items: center; gap: 11px; }
  .logo {
    display: inline-flex; align-items: center; justify-content: center;
    width: 40px; height: 40px; border-radius: 11px; flex: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; font-weight: 800; font-size: 17px; letter-spacing: .5px;
    box-shadow: 0 4px 14px rgba(92,108,255,0.35);
  }
  header h1 { font-size: 18px; margin: 0; line-height: 1.15; }
  header h1 .em { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  header .tagline { font-size: 11.5px; color: var(--muted); margin-top: 1px; }
  .grow { flex: 1; }
  .controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .toolbar { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 16px; }
  label.chk { color: var(--muted); display: flex; align-items: center; gap: 5px; cursor: pointer; }
  button {
    background: var(--accent); color: #fff; border: none; padding: 8px 18px;
    border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  button:disabled { background: #c2c8d2; cursor: not-allowed; }
  button.ghost { background: var(--panel2); color: var(--fg); border: 1px solid var(--border); }
  button.btn-email { background: var(--accent); color: #fff; border: none; }
  button.btn-email:hover:not(:disabled) { opacity: .9; }
  select { background: var(--panel2); color: var(--fg); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; }
  input[type=date], input[type=number] { background: var(--panel2); color: var(--fg); border: 1px solid var(--border); border-radius: 6px; padding: 5px 7px; font-size: 13px; }
  input[type=number] { width: 50px; }
  main { padding: 20px 24px; max-width: 1100px; margin: 0 auto; }
  .cfg { color: var(--muted); font-size: 12.5px; margin: 0; }
  .cfgbox { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 16px; }
  .cfg b { color: var(--fg); }
  .stages { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .stage {
    flex: 1; min-width: 120px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px;
  }
  .stage .name { font-weight: 600; display: flex; align-items: center; gap: 7px; }
  .stage .dot { width: 9px; height: 9px; border-radius: 50%; background: #c2c8d2; flex: none; }
  .stage.active .dot { background: var(--yellow); animation: pulse 1s infinite; }
  .stage.done .dot { background: var(--green); }
  .stage .msg { color: var(--muted); font-size: 12px; margin-top: 3px; min-height: 16px; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
  .bar { height: 6px; background: var(--panel2); border-radius: 4px; overflow: hidden; margin-top: 8px; }
  .bar > div { height: 100%; width: 0; background: linear-gradient(90deg,var(--accent),var(--accent2)); transition: width .3s; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; }
  .panel h2 { font-size: 14px; margin: 0 0 10px; color: var(--muted); font-weight: 600; letter-spacing: .03em; }
  .feed { max-height: 180px; overflow-y: auto; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
  .feed .row { padding: 2px 0; color: var(--muted); }
  .feed .row.err { color: var(--red); }
  .scored { display: flex; flex-wrap: wrap; gap: 6px; max-height: 150px; overflow-y: auto; }
  .pill { background: var(--panel2); border: 1px solid var(--border); border-radius: 999px; padding: 2px 9px; font-size: 12px; display: flex; gap: 6px; align-items: center; }
  .badge { font-weight: 700; border-radius: 6px; padding: 0 7px; font-size: 12px; color: #fff; }
  .b-hi { background: var(--green); } .b-mid { background: var(--yellow); } .b-lo { background: #5a6472; color: #fff; }
  .day-header { margin: 18px 0 12px; padding: 6px 12px; border-left: 3px solid var(--accent); background: var(--panel); border-radius: 6px; font-weight: 700; font-size: 14px; }
  .day-header .sub { color: var(--muted); font-weight: 400; font-size: 12.5px; margin-left: 8px; }
  details.grp { margin: 10px 0; }
  details.grp > summary { cursor: pointer; user-select: none; padding: 6px 10px; background: var(--panel2); border: 1px solid var(--border); border-radius: 8px; font-weight: 600; font-size: 13px; color: var(--fg); }
  details.grp[open] > summary { margin-bottom: 10px; }
  details.grp .grp-count { color: var(--muted); font-weight: 400; }
  details.grp .grp-cards { padding-left: 2px; }
  .tagchip { flex: none; align-self: flex-start; background: var(--panel2); border: 1px solid var(--border); color: var(--accent); border-radius: 999px; padding: 1px 9px; font-size: 12px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; margin-bottom: 14px; }
  .card .top { display: flex; gap: 10px; align-items: flex-start; }
  .card .title { font-size: 15.5px; font-weight: 650; margin: 0; flex: 1; }
  .card .meta { color: var(--muted); font-size: 12.5px; margin: 6px 0; }
  .card .reason { color: var(--accent); font-size: 13px; margin: 4px 0 10px; }
  .card a { color: var(--accent); text-decoration: none; }
  .card a:hover { text-decoration: underline; }
  .summary { background: var(--panel2); border-radius: 8px; padding: 12px 14px; font-size: 13.5px; }
  .summary.loading { color: var(--muted); font-style: italic; }
  button.retry { background: var(--accent2); color: #fff; border: none; padding: 4px 12px; border-radius: 6px; font-size: 12.5px; cursor: pointer; margin-left: 6px; }
  button.retry:hover { opacity: .9; }
  details.sum-more { margin-top: 8px; }
  details.sum-more > summary { cursor: pointer; color: var(--accent); font-size: 12.5px; user-select: none; }
  details.sum-more[open] > summary { margin-bottom: 6px; }
  details.abs { margin-top: 10px; }
  details.abs > summary { cursor: pointer; color: var(--accent); font-size: 13px; user-select: none; }
  details.abs .abs-en, details.abs .abs-zh { color: var(--muted); font-size: 13px; margin-top: 8px; line-height: 1.7; }
  details.abs .abs-en { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--muted); border-top-color: transparent; border-radius: 50%; animation: spin .8s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .trend-card { background: linear-gradient(135deg, rgba(47,111,235,.07), rgba(124,92,255,.07)); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; margin-bottom: 16px; }
  .trend-card > summary.trend-head { cursor: pointer; user-select: none; font-weight: 800; color: var(--accent); font-size: 13.5px; letter-spacing: .3px; }
  .trend-card[open] > summary.trend-head { margin-bottom: 8px; }
  .trend-overview { color: var(--fg); font-size: 13.5px; line-height: 1.75; }
  .trend-sub { font-weight: 700; color: var(--fg); margin: 12px 0 4px; font-size: 13px; }
  .trend-list { margin: 0; padding-left: 22px; }
  .trend-list li { margin: 8px 0; }
  .trend-list .badge { margin-right: 6px; }
  .trend-hl-title { font-weight: 600; }
  .trend-reason { color: var(--muted); font-size: 12.5px; margin-top: 2px; }
  .trend-obs { color: var(--muted); font-size: 12.5px; margin-top: 12px; }
  .card .meta.cmt { color: var(--muted); }
  .empty { color: var(--muted); text-align: center; padding: 30px; }
  .hidden { display: none; }
</style>
</head>
<body>
<header>
  <div class="brand">
    <span class="logo">Aha</span>
    <div>
      <h1><span class="em">AI helps all</span> 论文日报</h1>
    </div>
  </div>
</header>
<main>
  <div class="toolbar">
    <div class="controls">
      <select id="history" title="查看历史日报"><option value="">历史日报…</option></select>
      <label class="chk" title="参考日期（默认今天）；窗口截止于该日期的分界点">日期 <input type="date" id="runDate" /></label>
      <label class="chk" title="从选定日期往前 N 天（窗口 = 选定日期分界点 往前 N 天）">天数 <input type="number" id="runDaysBack" min="1" max="14" /></label>
      <label class="chk"><input type="checkbox" id="dryrun" /> 仅爬取</label>
      <label class="chk" title="忽略历史去重，重新处理"><input type="checkbox" id="refresh" /> 重新生成</label>
      <label class="chk" title="本次运行结束后发送邮件（需先在 config.yaml 配好 push.email 的 SMTP 参数）"><input type="checkbox" id="sendEmail" /> 发送邮件</label>
      <div class="grow"></div>
      <button id="runBtn">▶ 运行</button>
      <button id="stopBtn" class="ghost" style="display:none">■ 停止</button>
    </div>
  </div>
  <div class="cfgbox">
    <div class="cfg" id="cfgCats">加载配置中…</div>
    <div class="cfg" id="winHint"></div>
    <div class="cfg" id="cfgModels"></div>
    <div class="cfg" id="usageLine"></div>
  </div>

  <div class="stages" id="stages"></div>

  <div class="panel">
    <h2>运行日志</h2>
    <div class="feed" id="log"><div class="row">点击上方「运行」开始。</div></div>
  </div>

  <div class="panel hidden" id="scorePanel">
    <h2>实时打分 <span id="scoreProg" style="color:var(--muted)"></span></h2>
    <div class="bar"><div id="scoreBar"></div></div>
    <div class="scored" id="scored" style="margin-top:10px"></div>
  </div>

  <div class="panel hidden" id="sumPanel">
    <h2>总结进度 <span id="sumProg" style="color:var(--muted)"></span></h2>
    <div class="bar"><div id="sumBar"></div></div>
  </div>

  <div id="trendArea"></div>

  <div id="resultsHead" style="display:none;align-items:center;gap:10px;margin:8px 0">
    <h2 style="color:var(--muted);font-size:14px;margin:0">入选论文</h2>
    <span style="color:var(--muted);font-size:12.5px">分组</span>
    <select id="sortMode" style="padding:4px 8px">
      <option value="score">按分数</option>
      <option value="tag">按标签</option>
      <option value="summarized">按是否总结</option>
    </select>
    <button id="emailDigestBtn" class="btn-email" title="把当前查看的这天日报按邮件格式发送（需先配好 push.email）" style="margin-left:auto;display:none">✉ 发送邮件</button>
  </div>
  <div id="results"></div>
</main>

<script>
const $ = (id) => document.getElementById(id);
let currentDate = "";   // 历史查看/单天运行对应的日报日期
let currentDay = "";    // 多天运行时，当前正在处理的那一天
let currentCardsEl = null;   // 当前天的卡片容器
let boundaryHour = 8, tzOffset = 8;   // 来自配置：分界小时 / 时区偏移
let TAGS = [];               // 配置里的标签顺序
let collapsed = {};          // 记住各分组的折叠状态：composite key -> true(已折叠)

// 新建一个"天"的分区（含可选标题 + 卡片容器），返回卡片容器
function newDaySection(date, index, total) {
  const sec = document.createElement("div");
  sec.className = "day-section";
  sec.dataset.date = date || "";
  if (total > 1) {
    const h = document.createElement("div");
    h.className = "day-header";
    h.innerHTML = `📅 ${date} <span class="sub">第 ${index}/${total} 天</span>`;
    sec.appendChild(h);
  }
  const cardsEl = document.createElement("div");
  cardsEl.className = "day-cards";
  sec.appendChild(cardsEl);
  $("results").appendChild(sec);
  currentCardsEl = cardsEl;
  return cardsEl;
}

// 今日速览统一渲染到 #trendArea（运行日志之下、入选论文之上），可折叠；多天各一份
function trendSlot(date) {
  const area = $("trendArea");
  const key = date || "";
  let det = Array.from(area.children).find(d => d.dataset && d.dataset.trendDate === key);
  if (!det) {
    det = document.createElement("details");
    det.className = "trend-card";
    det.open = true;
    det.dataset.trendDate = key;
    det.innerHTML = `<summary class="trend-head">📌 今日速览</summary><div class="trend-body"></div>`;
    area.appendChild(det);
  }
  return det;
}

// 多天时给每张速览标题补上日期以区分；单天则只显示「今日速览」
function relabelTrends() {
  const slots = $("trendArea").querySelectorAll("details.trend-card");
  const multi = slots.length > 1;
  slots.forEach(det => {
    const sm = det.querySelector("summary.trend-head");
    if (!sm) return;
    const d = det.dataset.trendDate || "";
    sm.textContent = (multi && d) ? `📌 今日速览 · ${d}` : "📌 今日速览";
  });
}

// 渲染趋势综述（按日期定位到 #trendArea 的折叠卡）
function renderTrend(date, trend) {
  if (!trend) return;
  const det = trendSlot(date);
  const ov = trend.overview ? `<div class="trend-overview">${renderSummary(trend.overview)}</div>` : "";
  let hl = "";
  const hls = trend.highlights || [];
  if (hls.length) {
    hl = `<div class="trend-sub">编辑精选</div><ol class="trend-list">` +
      hls.map(h => `<li><span class="badge ${badgeClass(h.score)}">${h.score}</span>` +
        `<span class="trend-hl-title">${escapeHtml(h.title || "")}</span>` +
        `<div class="trend-reason">${escapeHtml(h.reason || "")}</div></li>`).join("") +
      `</ol>`;
  }
  const obs = (trend.observation || "").trim();
  const obsBlock = (obs && !["暂无", "无", "N/A"].includes(obs))
    ? `<div class="trend-obs">补充观察：${escapeHtml(obs)}</div>` : "";
  det.querySelector(".trend-body").innerHTML = ov + hl + obsBlock;
  relabelTrends();
}

function orderedCats(p) {
  const cats = (p.categories || []).slice();
  const pc = p.primary_category;
  if (pc) return [pc, ...cats.filter(c => c !== pc)];
  return cats;
}
function catsLabel(p) {
  const cats = orderedCats(p);
  if (p.primary_category && cats.length) {
    return escapeHtml(cats[0]) + "（主）" + (cats.length > 1 ? "，" + escapeHtml(cats.slice(1).join(", ")) : "");
  }
  return escapeHtml(cats.join(", "));
}
function doiUrl(doi) {
  const d = (doi || "").trim();
  return /^https?:\/\//.test(d) ? d : ("https://doi.org/" + d);
}

// 计算某卡片在当前模式下的分组键与显示标签
function groupOf(mode, card) {
  if (mode === "tag") { const t = card.dataset.tag || "其他"; return { key: "t:" + t, label: t }; }
  if (mode === "summarized") {
    const ok = card.dataset.summarized === "1";
    return { key: ok ? "s:1" : "s:0", label: ok ? "已总结" : "未总结" };
  }
  const sc = parseInt(card.dataset.score || "0");
  return { key: "sc:" + sc, label: sc + " 分" };
}

function orderKeys(mode, keys) {
  if (mode === "tag") {
    const ord = [...TAGS]; if (!ord.includes("其他")) ord.push("其他");
    return keys.sort((a, b) => {
      const ia = ord.indexOf(a.slice(2)), ib = ord.indexOf(b.slice(2));
      return (ia < 0 ? 999 : ia) - (ib < 0 ? 999 : ib);
    });
  }
  if (mode === "summarized") return keys.sort((a, b) => a < b ? 1 : -1);  // s:1 在前
  return keys.sort((a, b) => parseInt(b.slice(3)) - parseInt(a.slice(3))); // 分数降序
}

// 按当前模式把每个"天"分区内的卡片重组为可折叠分组（保留卡片 DOM 与已填内容）
function applyGrouping() {
  const mode = $("sortMode") ? $("sortMode").value : "score";
  document.querySelectorAll(".day-section").forEach(sec => {
    const cardsEl = sec.querySelector(".day-cards");
    if (!cardsEl) return;
    const date = sec.dataset.date || "";
    const all = Array.from(sec.querySelectorAll(".card"));
    if (!all.length) return;
    const groups = new Map();
    all.forEach(card => {
      const g = groupOf(mode, card);
      if (!groups.has(g.key)) groups.set(g.key, { label: g.label, cards: [] });
      groups.get(g.key).cards.push(card);
    });
    cardsEl.innerHTML = "";   // 卡片已在 all 中持有引用，可安全重排
    orderKeys(mode, Array.from(groups.keys())).forEach(key => {
      const g = groups.get(key);
      g.cards.sort((a, b) => parseInt(b.dataset.score || "0") - parseInt(a.dataset.score || "0"));
      const det = document.createElement("details");
      det.className = "grp";
      const ck = `${mode}::${date}::${key}`;
      det.open = !collapsed[ck];
      det.addEventListener("toggle", () => { collapsed[ck] = !det.open; });
      const sm = document.createElement("summary");
      sm.innerHTML = `${escapeHtml(g.label)} <span class="grp-count">(${g.cards.length})</span>`;
      det.appendChild(sm);
      const box = document.createElement("div");
      box.className = "grp-cards";
      g.cards.forEach(c => box.appendChild(c));
      det.appendChild(box);
      cardsEl.appendChild(det);
    });
  });
}
const STAGES = [
  ["crawl", "爬取 arxiv"], ["dedup", "去重"], ["filter", "相关性筛选"],
  ["summarize", "生成总结"], ["trend", "趋势综述"], ["push", "推送/归档"],
];
let cards = {}; // short_id -> {el, summaryEl}

function escapeHtml(s) {
  return (s || "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDuration(s) {
  s = Math.max(0, +s || 0);
  if (s < 60) return s.toFixed(1) + " 秒";
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  if (m < 60) return `${m} 分 ${sec} 秒`;
  const h = Math.floor(m / 60), mm = m % 60;
  return `${h} 时 ${String(mm).padStart(2, "0")} 分`;
}
function renderSummary(text) {
  let h = escapeHtml(text);
  h = h.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  h = h.replace(/\n/g, "<br>");
  return h;
}
function badgeClass(score) { return score >= 8 ? "b-hi" : score >= 6 ? "b-mid" : "b-lo"; }

function initStages() {
  $("stages").innerHTML = STAGES.map(([k, label]) =>
    `<div class="stage" id="stage-${k}"><div class="name"><span class="dot"></span>${label}</div><div class="msg" id="msg-${k}"></div></div>`
  ).join("");
}
function setStage(name, status, msg) {
  const el = $("stage-" + name);
  if (!el) return;
  el.classList.remove("active", "done");
  if (status === "start") el.classList.add("active");
  if (status === "done") el.classList.add("done");
  if (msg != null) $("msg-" + name).textContent = msg;
}
function log(msg, isErr) {
  const row = document.createElement("div");
  row.className = "row" + (isErr ? " err" : "");
  row.textContent = msg;
  $("log").appendChild(row);
  $("log").scrollTop = $("log").scrollHeight;
}

function makeCard(p) {
  const el = document.createElement("div");
  el.className = "card";
  const authors = (p.authors || []).slice(0, 6).join(", ") + ((p.authors||[]).length > 6 ? " 等" : "");
  const tag = p.tag || "其他";
  const comment = (p.comment || "").trim();
  const journal = (p.journal_ref || "").trim();
  const commentRow = comment ? `<div class="meta cmt">备注：${escapeHtml(comment)}</div>` : "";
  const journalRow = journal ? `<div class="meta" style="color:var(--green)">发表于：${escapeHtml(journal)}</div>` : "";
  const doiLink = p.doi ? ` · <a href="${doiUrl(p.doi)}" target="_blank">DOI</a>` : "";
  el.innerHTML = `
    <div class="top">
      <span class="badge ${badgeClass(p.score)}">${p.score}</span>
      <h3 class="title">${escapeHtml(p.title)}</h3>
      <span class="tagchip">${escapeHtml(tag)}</span>
    </div>
    <div class="reason">${escapeHtml(p.reason || "")}</div>
    <div class="meta">作者：${escapeHtml(authors)}</div>
    <div class="meta aff">发表机构：<span class="aff-val" style="color:var(--muted)">${p.will_summarize === false ? "（未生成）" : "解析中…"}</span></div>
    ${commentRow}
    ${journalRow}
    <div class="meta">${catsLabel(p)} ·
      <a href="${p.entry_url}" target="_blank">摘要页</a> ·
      <a href="${p.pdf_url}" target="_blank">PDF</a>${doiLink}</div>
    <div class="summary"></div>
    <details class="abs">
      <summary class="abs-sum">原始摘要</summary>
      <div class="abs-zh"></div>
      <div class="abs-en"><b>Abstract (EN)</b>: ${escapeHtml(p.abstract || "")}</div>
    </details>`;
  el.dataset.score = p.score;
  el.dataset.tag = tag;
  el.dataset.summarized = summaryState(p) === "ok" ? "1" : "0";
  (currentCardsEl || $("results")).appendChild(el);
  cards[p.short_id] = {
    el,
    summaryEl: el.querySelector(".summary"),
    affEl: el.querySelector(".aff-val"),
    absZhEl: el.querySelector(".abs-zh"),
    absSumEl: el.querySelector(".abs-sum"),
    date: p.date || currentDate,   // 该篇所属日报日期，用于「重新/生成总结」
  };
  renderSummaryArea(p.short_id, p);
  return cards[p.short_id];
}

function isFailedText(s) {
  return !!s && (s.startsWith("(总结生成失败") || s === "(无总结)");
}

// 计算总结区状态：ok=已总结 / failed=失败 / pending=待总结(将自动总结) / none=保留但未总结
function summaryState(p) {
  const s = p.summary || "";
  if (s && !isFailedText(s)) return "ok";
  if (isFailedText(s)) return "failed";
  return p.will_summarize ? "pending" : "none";
}

// 把总结拆成“一句话总结”（常显）与其余部分（折叠）
function splitSummary(text) {
  const t = (text || "").trim();
  // head = 第一条（一句话总结）；body = 从第二个 **小标题** 起的其余内容（与具体小标题名解耦，改 prompt 也不怕）
  const m = t.match(/\n\s*\*\*/);
  if (m && m.index > 0) return { head: t.slice(0, m.index).trim(), body: t.slice(m.index).trim() };
  return { head: t, body: "" };
}

function renderSummaryArea(short_id, p) {
  const c = cards[short_id];
  if (!c) return;
  const el = c.summaryEl;
  const st = summaryState(p);
  el.classList.toggle("loading", st === "pending");
  if (c.el) c.el.dataset.summarized = st === "ok" ? "1" : "0";
  if (st === "ok") {
    const { head, body } = splitSummary(p.summary);
    el.innerHTML = renderSummary(head) +
      (body ? `<details class="sum-more"><summary>展开完整解读</summary>${renderSummary(body)}</details>` : "");
  } else if (st === "pending") {
    el.innerHTML = `<span class="spinner"></span>总结生成中…`;
  } else if (st === "failed") {
    el.innerHTML = `<span style="color:var(--red)">总结生成失败（可能超时）</span> ` +
      `<button class="retry">重新总结</button>`;
    el.querySelector(".retry").onclick = () => retrySummary(short_id);
  } else { // none：保留但未自动总结
    el.innerHTML = `<span style="color:var(--muted)">未生成 AI 总结</span> ` +
      `<button class="retry">生成总结</button>`;
    el.querySelector(".retry").onclick = () => retrySummary(short_id);
  }
}

function fillCard(short_id, data) {
  const c = cards[short_id];
  if (!c) return;
  if (data.summary != null) renderSummaryArea(short_id, data);
  const affs = data.affiliations || [];
  const noAff = !affs.length;
  // 未总结的论文不显示“解析中…”，显示“（未生成）”
  c.affEl.textContent = affs.length ? affs.join("；") : (summaryState(data) === "none" ? "（未生成）" : "未识别");
  c.affEl.style.color = noAff ? "var(--muted)" : "var(--fg)";
  if (data.abstract_zh) {
    c.absZhEl.innerHTML = `<b>摘要（中文）</b>：${escapeHtml(data.abstract_zh)}<br><br>`;
    if (c.absSumEl) c.absSumEl.textContent = "原始摘要 / 中文翻译";
  }
}

async function retrySummary(short_id) {
  const c = cards[short_id];
  if (!c) return;
  c.summaryEl.classList.add("loading");
  c.summaryEl.innerHTML = `<span class="spinner"></span>重新总结中…`;
  try {
    const d = c.date || currentDate || "";
    const r = await (await fetch(`/api/resummarize?short_id=${encodeURIComponent(short_id)}&date=${encodeURIComponent(d)}`)).json();
    if (r.error) {
      c.summaryEl.classList.remove("loading");
      c.summaryEl.innerHTML = `<span style="color:var(--red)">${escapeHtml(r.error)}</span> ` +
        `<button class="retry" data-id="${short_id}">重试</button>`;
      c.summaryEl.querySelector(".retry").onclick = () => retrySummary(short_id);
      return;
    }
    fillCard(short_id, r);
  } catch (e) {
    c.summaryEl.classList.remove("loading");
    c.summaryEl.innerHTML = `<span style="color:var(--red)">请求失败，请稍后重试</span>`;
  }
}

function resetUI() {
  cards = {};
  currentDay = "";
  currentCardsEl = null;
  $("trendArea").innerHTML = "";
  $("results").innerHTML = "";
  $("log").innerHTML = "";
  $("scored").innerHTML = "";
  $("scoreBar").style.width = "0";
  $("sumBar").style.width = "0";
  $("scoreProg").textContent = "";
  $("sumProg").textContent = "";
  $("scorePanel").classList.add("hidden");
  $("sumPanel").classList.add("hidden");
  $("resultsHead").style.display = "none";
  $("emailDigestBtn").style.display = "none";
  $("stages").style.display = "";   // 运行视图显示进度灯（历史视图会再隐藏）
  initStages();
}

// 仅当结果区已有论文卡片时才显示「入选论文 分组」这一行
function updateResultsHead() {
  const hasCards = $("results").querySelector(".card") != null;
  $("resultsHead").style.display = hasCards ? "flex" : "none";
}

function handle(ev) {
  const { type, payload } = ev;
  switch (type) {
    case "day_start": {
      currentDay = payload.date;
      currentDate = payload.date;
      // 每天开始：重置阶段与进度条/打分流（但保留已完成天的结果卡片），并新建该天分区
      initStages();
      $("scored").innerHTML = ""; $("scoreBar").style.width = "0"; $("sumBar").style.width = "0";
      $("scoreProg").textContent = ""; $("sumProg").textContent = "";
      $("scorePanel").classList.add("hidden"); $("sumPanel").classList.add("hidden");
      newDaySection(payload.date, payload.index, payload.total);
      log(`===== 处理 ${payload.date}（第 ${payload.index}/${payload.total} 天）=====`);
      break;
    }
    case "stage":
      setStage(payload.name, payload.status, payload.message);
      log(`[${payload.name}] ${payload.message || payload.status}`);
      if (payload.name === "filter" && payload.status === "start") $("scorePanel").classList.remove("hidden");
      if (payload.name === "summarize" && payload.status === "start") $("sumPanel").classList.remove("hidden");
      break;
    case "score_progress": {
      const pct = payload.total ? (payload.done / payload.total * 100) : 0;
      $("scoreBar").style.width = pct + "%";
      $("scoreProg").textContent = `${payload.done}/${payload.total}`;
      break;
    }
    case "scored_batch":
      (payload.papers || []).forEach(p => {
        const pill = document.createElement("div");
        pill.className = "pill";
        pill.innerHTML = `<span class="badge ${badgeClass(p.score)}">${p.score}</span>${escapeHtml(p.title.slice(0,48))}`;
        $("scored").prepend(pill);
      });
      while ($("scored").children.length > 80) $("scored").lastChild.remove();
      break;
    case "selected": {
      const ps = payload.papers || [];
      ps.forEach(makeCard);
      applyGrouping();
      updateResultsHead();
      const willSum = ps.filter(p => p.will_summarize).length;
      log(`命中 ${ps.length} 篇（${willSum} 篇将生成 AI 总结，其余保留，可按需生成）`);
      break;
    }
    case "summarize_progress": {
      const pct = payload.total ? (payload.done / payload.total * 100) : 0;
      $("sumBar").style.width = pct + "%";
      $("sumProg").textContent = `${payload.done}/${payload.total}`;
      break;
    }
    case "paper_summarized":
      fillCard(payload.short_id, payload);
      if ($("sortMode") && $("sortMode").value === "summarized") applyGrouping();
      break;
    case "trend": {
      renderTrend(payload.date, payload.trend);
      log("📌 今日速览已生成");
      break;
    }
    case "dry_run_candidates": {
      const frag = (payload.papers||[]).map(p =>
        `<div class="card"><div class="meta">[${escapeHtml((p.categories||[]).join(", "))}]</div>
         <h3 class="title">${escapeHtml(p.title)}</h3></div>`).join("");
      (currentCardsEl || $("results")).insertAdjacentHTML("beforeend", frag);   // 追加到当天分区
      updateResultsHead();
      break;
    }
    case "pushed":
      if (payload.date) currentDate = payload.date;
      log(`已归档: ${payload.json || ""}${payload.markdown ? "  " + payload.markdown : ""}`);
      break;
    case "log":
      log(payload.message);
      break;
    case "error":
      log(payload.message, true);
      break;
    case "usage": {
      const by = payload.by_model || {};
      const detail = Object.keys(by).map(m => `${m}: ${(by[m].total_tokens||0).toLocaleString()}`).join("，");
      log(`📊 本次用量：${payload.requests||0} 次请求，${(payload.total_tokens||0).toLocaleString()} tokens${detail ? "（"+detail+"）" : ""}`);
      loadUsage();
      break;
    }
    case "done": {
      const ds = payload.days && payload.days > 1 ? `（${payload.days} 天，各自独立日报）` : "";
      const cost = payload.elapsed != null ? `，用时 ${fmtDuration(payload.elapsed)}` : "";
      if (payload.stopped) log(`⏹ 已停止 共 ${payload.count} 篇${ds}${cost}`, true);
      else log(`完成 ✅ 共 ${payload.count} 篇${ds}${cost}`);
      loadHistory();   // 刷新历史下拉，纳入本次新生成的日报
      finish();
      break;
    }
  }
}

let es = null;          // 当前 EventSource
let running = false;    // 后台是否有运行
let attached = false;   // 本页是否正接着进度流
let lastSeq = -1;       // 已处理事件的最大 seq（去重，兼容自动重连重复回放）
let poll = null;        // 脱离进度时轮询运行状态

function updateBtn() {
  $("runBtn").disabled = false;
  if (!running) $("runBtn").textContent = "▶ 运行";
  else $("runBtn").textContent = attached ? "● 运行中" : "● 查看进度";
  $("stopBtn").style.display = running ? "" : "none";
  if (!running) { $("stopBtn").disabled = false; $("stopBtn").textContent = "■ 停止"; }
}

async function onStopClick() {
  $("stopBtn").disabled = true;
  $("stopBtn").textContent = "停止中…";
  try { await fetch("/api/stop"); } catch {}
  // 实际结束由后台的 _end 事件触发 finish()
  log("⏹ 已立即终止运行进程。");
  setTimeout(() => { $("stopBtn").disabled = false; $("stopBtn").textContent = "■ 停止"; }, 1500);
}

function maybePoll() {
  clearInterval(poll); poll = null;
  // 在“看历史/未接进度”但后台仍在运行时，轮询状态以便结束后复位按钮
  if (running && !attached) {
    poll = setInterval(async () => {
      try {
        const s = await (await fetch("/api/status")).json();
        if (!s.running) { running = false; updateBtn(); clearInterval(poll); poll = null; }
      } catch {}
    }, 4000);
  }
}

function finish() {
  if (es) { es.close(); es = null; }
  running = false; attached = false;
  updateBtn(); maybePoll();
}

// 仅断开本页的进度流（不影响后台运行），用于切去看历史
function detachStream() {
  if (es) { es.close(); es = null; }
  attached = false;
  updateBtn(); maybePoll();
}

// 接入（或重新接入）正在进行的运行：重置界面并回放 + 续看实时
function attachStream() {
  if (es) { es.close(); es = null; }
  resetUI();
  lastSeq = -1; attached = true;
  updateBtn(); maybePoll();
  es = new EventSource("/api/stream");
  es.onmessage = (e) => {
    let data; try { data = JSON.parse(e.data); } catch { return; }
    if (data.seq !== undefined && data.seq >= 0) {
      if (data.seq <= lastSeq) return;   // 去重：跳过已处理（含重连重复回放）
      lastSeq = data.seq;
    }
    if (data.type === "_end") { finish(); return; }
    handle(data);
  };
  // 出错时让 EventSource 自动重连；seq 去重保证不重复渲染，不在此 finish
  es.onerror = () => {};
}

async function onRunClick() {
  if (!running) {
    running = true; updateBtn();
    const dry = $("dryrun").checked, refresh = $("refresh").checked;
    const email = $("sendEmail").checked;
    const date = $("runDate").value || "";
    const daysBack = parseInt($("runDaysBack").value) || 0;
    if (date) currentDate = date;   // 单篇「生成总结」会用这个日期定位日报
    const qs = `dry_run=${dry}&refresh=${refresh}&email=${email}&date=${encodeURIComponent(date)}&days_back=${daysBack}`;
    try { await fetch(`/api/start?${qs}`); } catch {}
  }
  attachStream();   // 无论是否已在运行，都接入进度流（回放 + 实时）
}

async function loadConfig() {
  try {
    const c = await (await fetch("/api/config")).json();
    if (c.error) { $("cfgCats").innerHTML = `配置错误：${escapeHtml(c.error)}`; return; }
    boundaryHour = c.day_boundary_hour ?? 8;
    tzOffset = c.tz_offset_hours ?? 8;
    TAGS = c.tags || [];
    // 日期/天数控件默认值
    if (c.today && !$("runDate").value) { $("runDate").value = c.today; currentDate = c.today; }
    if (c.days_back && !$("runDaysBack").value) $("runDaysBack").value = c.days_back;
    const hh = String(boundaryHour).padStart(2, "0");
    const sumBasis = c.summarize_fulltext ? `全文（前 ${(c.fulltext_max_chars||0).toLocaleString()} 字）` : "摘要";
    // 第一行：抓取分类；紧接着 winHint(抓取窗口)；再是筛选/总结模型两行
    $("cfgCats").innerHTML = `抓取分类 <b>${c.categories.join(" / ")}</b>`;
    $("cfgModels").innerHTML = [
      `筛选模型 <b>${escapeHtml(c.filter_model)}</b> · 分数阈值 <b>${c.relevance_threshold}</b>`,
      `总结模型 <b>${escapeHtml(c.summarize_model)}</b> · 每份日报总结上限 <b>${c.max_summarize}</b> 篇 · 总结依据 <b>${sumBasis}</b>`,
    ].join("<br>");
    updateWinHint();
  } catch { $("cfgCats").textContent = "无法加载配置。"; }
}

// 根据所选日期/天数实时显示抓取窗口（本地时区），消除“往前/往后”的歧义
function updateWinHint() {
  const dateStr = $("runDate").value;
  const db = parseInt($("runDaysBack").value) || 1;
  if (!dateStr) { $("winHint").innerHTML = ""; return; }
  const hh = String(boundaryHour).padStart(2, "0");
  const end = new Date(dateStr + "T00:00:00");   // 仅用于日期算术
  const start = new Date(end); start.setDate(start.getDate() - db);
  const fmt = (d) => `${d.getMonth() + 1}/${d.getDate()} ${hh}:00`;
  $("winHint").innerHTML =
    `抓取窗口 <b>${fmt(start)}</b> ~ <b>${fmt(end)}</b>（本地 UTC+${tzOffset}，即选定日期往前 ${db} 天）`;
}

async function loadUsage() {
  try {
    const u = await (await fetch("/api/usage")).json();
    const t = u.today || {}, r = u.recent || {};
    const fmt = (n) => (n || 0).toLocaleString();
    $("usageLine").innerHTML =
      `📊 Token 用量 · 今日 <b>${fmt(t.total_tokens)}</b>（${t.requests || 0} 次请求）· 近 ${u.recent_days || 7} 天 <b>${fmt(r.total_tokens)}</b>`;
  } catch {}
}

async function loadHistory() {
  try {
    const h = await (await fetch("/api/history")).json();
    const sel = $("history");
    sel.innerHTML = '<option value="">历史日报…</option>';   // 先清空再填，避免重复
    (h.digests || []).forEach(d => {
      const o = document.createElement("option");
      o.value = d.date; o.textContent = `${d.date} (${d.count} 篇)`;
      sel.appendChild(o);
    });
  } catch {}
}

async function showHistory(date) {
  if (!date) return;
  currentDate = date;
  detachStream();   // 切去看历史时只断开本页进度流，后台运行继续
  resetUI();
  $("stages").style.display = "none";   // 查看历史时不显示运行进度灯那一行
  const d = await (await fetch("/api/digest/" + date)).json();
  if (d.error) { log("加载失败: " + d.error, true); return; }
  $("emailDigestBtn").style.display = (d.papers && d.papers.length) ? "" : "none";
  newDaySection(date, 1, 1);
  if (d.trend) renderTrend(date, d.trend);
  (d.papers || []).forEach(p => {
    makeCard({ ...p, date });
    fillCard(p.short_id, p);
  });
  applyGrouping();
  updateResultsHead();
  log(`已加载 ${date} 的日报，共 ${(d.papers||[]).length} 篇。`);
  if (running) log("提示：后台仍在运行，点上方「查看进度」可返回实时进度。");
}

// 把当前查看的这天日报按邮件格式发送
async function emailDigest() {
  const date = currentDate;
  if (!date) return;
  const btn = $("emailDigestBtn");
  const old = btn.textContent;
  btn.disabled = true;
  btn.textContent = "发送中…";
  try {
    const r = await (await fetch(`/api/email_digest?date=${encodeURIComponent(date)}`)).json();
    if (r.error) {
      log("邮件发送失败：" + r.error, true);
      btn.textContent = "✉ 发送失败";
    } else {
      log(`✅ 已发送 ${r.date} 日报邮件至 ${(r.to || []).join(", ")}（${r.count} 篇）`);
      btn.textContent = "✉ 已发送";
    }
  } catch (e) {
    log("邮件发送请求失败，请稍后重试", true);
    btn.textContent = "✉ 发送失败";
  }
  setTimeout(() => { btn.disabled = false; btn.textContent = old; }, 2500);
}

// 页面加载时若后台正在运行，自动接回进度，并回填正在运行的日期/天数
async function initStatus() {
  try {
    const s = await (await fetch("/api/status")).json();
    if (s.running) {
      running = true;
      const pr = s.params || {};
      if (pr.date) { $("runDate").value = pr.date; currentDate = pr.date; }
      if (pr.days_back) $("runDaysBack").value = pr.days_back;
      if (pr.email) $("sendEmail").checked = true;
      updateWinHint();
      attachStream();
    }
  } catch {}
  updateBtn();
}

$("runBtn").addEventListener("click", onRunClick);
$("stopBtn").addEventListener("click", onStopClick);
$("history").addEventListener("change", (e) => showHistory(e.target.value));
$("emailDigestBtn").addEventListener("click", emailDigest);
$("runDate").addEventListener("change", updateWinHint);
$("runDaysBack").addEventListener("input", updateWinHint);
$("sortMode").addEventListener("change", applyGrouping);
initStages();
loadConfig();
loadHistory();
loadUsage();
initStatus();
</script>
</body>
